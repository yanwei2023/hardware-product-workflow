services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      HOST: 0.0.0.0
      PORT: 3001
      HARDWARE_FLOW_STORE_PATH: /app/data/demo-store.json
    ports:
      - "3001:3001"
    volumes:
      - app-data:/app/data

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: hardware_flow
      POSTGRES_USER: hardware_flow
      POSTGRES_PASSWORD: hardware_flow_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../migrations:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  app-data:
  postgres-data:
  minio-data:
